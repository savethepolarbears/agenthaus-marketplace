name: Validate Plugins & Marketplace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-plugins:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all plugins and marketplace
        run: bash scripts/validate-plugins.sh

  validate-json:
    name: Validate JSON syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check marketplace.json
        run: python3 -m json.tool .claude-plugin/marketplace.json > /dev/null

      - name: Check all plugin.json files
        run: |
          for f in plugins/*/.claude-plugin/plugin.json; do
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null || exit 1
          done

      - name: Check all .mcp.json files
        run: |
          for f in plugins/*/.mcp.json; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null || exit 1
          done

      - name: Check all hooks.json files
        run: |
          for f in plugins/*/hooks/hooks.json; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null || exit 1
          done

  lint-web:
    name: Lint & build web storefront
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agenthaus-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agenthaus-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
